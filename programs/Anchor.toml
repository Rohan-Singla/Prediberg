[toolchain]
anchor_version = "0.31.1"

[features]
resolution = true
skip-lint = false

[programs.localnet]
prediberg = "ERBbHZVm9JdNv31YDj8SstNy6vwuCyAwifhUWtQKdtN5"

[programs.devnet]
prediberg = "ERBbHZVm9JdNv31YDj8SstNy6vwuCyAwifhUWtQKdtN5"

[programs.mainnet]
prediberg = "ERBbHZVm9JdNv31YDj8SstNy6vwuCyAwifhUWtQKdtN5"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "RUST_LOG=error yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test]
startup_wait = 5000

[test.validator]
url = "https://api.devnet.solana.com"

[[test.validator.clone]]
address = "TokenzQdBNbLqP5VEhdkAS6EPFLC1PHnBqCXEpPxuEb"

[workspace]
members = ["programs/*"]
